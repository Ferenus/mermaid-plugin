modules:
  macro:
    - key: mermaid-diagrams-for-confluence
      resource: main
      resolver:
        function: resolver
      title: Mermaid Diagrams for Confluence
      description: Create and render Mermaid diagrams in Confluence pages
      config:
        resource: macro-config
        viewportSize: max
        title: Edit Diagram
  function:
    - key: resolver
      handler: index.handler
resources:
  - key: main
    path: static/app/build
  - key: macro-config
    path: static/app/build
permissions:
  scopes:
    - storage:app
    - read:confluence-content.all
  content:
    styles:
      - 'unsafe-inline'
app:
  runtime:
    name: nodejs24.x
    memoryMB: 256
    architecture: arm64
  id: ari:cloud:ecosystem::app/7d977eb8-4b48-476a-9912-0b2f0ab31729
